<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 100" width="440" height="100">
  <!-- Hexagon icon -->
  <polygon points="50,5 84,24 84,62 50,81 16,62 16,24" fill="#FF5500"/>
  <!-- M letter inside hexagon -->
  <path d="M30 64 L30 36 L50 56 L70 36 L70 64" stroke="white" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Wordmark: MoysesNet in one continuous text block using tspan -->
  <text x="98" y="60" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="42" letter-spacing="-1">
    <tspan fill="#ffffff">Moyses</tspan><tspan fill="#FF5500">Net</tspan>
  </text>

  <!-- Tagline -->
  <rect x="98" y="70" width="20" height="2" fill="#FF5500" rx="1"/>
  <text x="126" y="82" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="rgba(255,255,255,0.45)" letter-spacing="2">ATENDIMENTO INTELIGENTE</text>
</svg>
